<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#d9eef9" />
  <title>观云记</title>
  <link rel="stylesheet" href="./style.css?v=20260228-1205" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>观云记</h1>
        <p id="todayText" class="muted"></p>
      </div>
      <button id="newNoteQuick" class="btn ghost">新建笔记</button>
    </header>

    <main>
      <section class="card hero" id="heroCard">
        <div class="hero-main">
          <div id="heroIcon" class="icon" aria-hidden="true"></div>
          <div>
            <h2 id="heroTitle">等待观测</h2>
            <p id="heroDesc" class="muted">拍一张天空，开始今天的观云记录</p>
          </div>
        </div>
        <p id="heroTip" class="tip">建议：先拍照识别，再记录当下想法 🌿</p>
      </section>

      <section class="card">
        <h3>观云识别</h3>
        <label for="photoInput" class="uploader" id="uploader">
          <img id="preview" alt="" hidden onerror="this.hidden=true;this.classList.remove('is-ready');" />
          <div id="uploadHint" class="upload-hint">
            <div class="upload-icon" aria-hidden="true">☁️</div>
            <div class="upload-text">点击上传 / 拍摄天空照片</div>
            <div class="upload-sub">建议拍摄天空占画面 70% 以上</div>
          </div>
        </label>
        <input id="photoInput" type="file" accept="image/*" capture="environment" hidden />

        <div class="actions">
          <button id="analyzeBtn" class="btn" disabled>开始识别</button>
          <button id="saveWeatherBtn" class="btn ghost" disabled>保存观测</button>
          <button id="writeWithWeatherBtn" class="btn ghost" disabled>写点想法</button>
        </div>

        <div id="result" class="result" aria-live="polite" hidden></div>
        <canvas id="analysisCanvas" hidden></canvas>
      </section>

      <section class="card">
        <div class="row between section-head">
          <h3>观测记录</h3>
          <span class="muted" id="weatherCount">0 条</span>
        </div>
        <div id="weatherSummary" class="trend-summary"></div>
        <div id="weatherTrend" class="trend"></div>
        <div id="weatherDailyTrend" class="daily-trend"></div>
        <div id="weatherList" class="list"></div>
      </section>

      <section class="card">
        <div class="row between section-head notes-head">
          <h3>笔记</h3>
          <label for="searchInput" class="sr-only">搜索笔记</label>
          <input id="searchInput" class="search" placeholder="搜索标题或内容..." />
        </div>
        <div id="notesList" class="list"></div>
      </section>
    </main>
  </div>

  <dialog id="noteDialog">
    <form method="dialog" class="dialog-body">
      <h3 id="dialogTitle">新建笔记</h3>
      <input id="noteTitle" placeholder="标题（可选）" maxlength="50" />
      <textarea id="noteContent" rows="8" placeholder="记下此刻的想法..." required></textarea>
      <p id="noteWeatherHint" class="muted"></p>
      <div class="row end gap">
        <button value="cancel" class="btn ghost" type="button" id="cancelNote">取消</button>
        <button value="save" class="btn" type="button" id="saveNote">保存</button>
      </div>
    </form>
  </dialog>

  <script src="./app.js?v=20260228-1205"></script>
</body>
</html>
